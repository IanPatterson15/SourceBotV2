<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SourceBot</title>
    <meta name="description" content="SourceBot — search thousands of economics papers and generate citations instantly." />
    <meta name="application-name" content="SourceBot" />
    <meta name="author" content="Ian Patterson" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sourcebot.ca" />
    <meta property="og:title" content="SourceBot" />
    <meta property="og:description" content="Search for what you need. Find economics papers and generate citations instantly." />
    <meta property="og:site_name" content="SourceBot" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SourceBot" />
    <meta name="twitter:description" content="Search for what you need. Find economics papers and generate citations instantly." />

    <!-- Canonical -->
    <link rel="canonical" href="https://sourcebot.ca/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "SourceBot",
      "url": "https://sourcebot.ca",
      "description": "AI-powered research assistant that searches peer-reviewed economics papers and generates APA and MLA citations instantly.",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Person",
        "name": "Ian Patterson"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
